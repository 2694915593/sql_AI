# AI-SQL质量分析系统配置文件 - 多数据库配置示例
# 用户需求：一条SQL可能在A库，也可能在B库，需要配置两个一样名称的不同数据库，扫描的时候需要扫两个

[database]
# 源数据库配置（存储待分析SQL的数据库）
source_host = localhost
source_port = 3306
source_database = sql_analysis_db
source_username = root
source_password = 123456
source_db_type = mysql

# ============================================================
# 多数据库配置示例
# ============================================================

# 情况1：同一个数据库别名，多个实例配置（用户需求场景）
# SQL可能在A库，也可能在B库，配置两个一样名称的不同数据库
# 格式：[数据库别名:实例编号]，实例编号从1开始

[db_production:1]
# 生产数据库A实例
host = localhost
port = 3306
database = production_db_a
username = root
password = 123456
db_type = mysql

[db_production:2]
# 生产数据库B实例
host = localhost
port = 3306
database = production_db_b
username = root
password = 123456
db_type = mysql

# 还可以继续添加更多实例
# [db_production:3]
# host = 192.168.1.100
# port = 3306
# database = production_db_c
# username = prod_user
# password = prod_pass
# db_type = mysql

# ============================================================
# 情况2：不同环境的数据库配置
# ============================================================

# 测试环境数据库（单实例，传统格式）
[db_test]
host = localhost
port = 3306
database = test_db
username = root
password = 123456
db_type = mysql

# 开发环境数据库（多实例）
[db_dev:1]
host = localhost
port = 3306
database = dev_db_a
username = root
password = 123456
db_type = mysql

[db_dev:2]
host = localhost
port = 3307
database = dev_db_b
username = root
password = 123456
db_type = mysql

# ============================================================
# 情况3：特定系统的数据库配置
# ============================================================

[ECUP:1]
# ECUP系统数据库A实例
host = localhost
port = 3306
database = ecup_a_db
username = root
password = 123456
db_type = mysql

[ECUP:2]
# ECUP系统数据库B实例
host = localhost
port = 3306
database = ecup_b_db
username = root
password = 123456
db_type = mysql

[ORDER:1]
# 订单系统数据库A实例
host = localhost
port = 3306
database = order_a_db
username = root
password = 123456
db_type = mysql

[ORDER:2]
# 订单系统数据库B实例
host = 192.168.1.101
port = 3306
database = order_b_db
username = order_user
password = order_pass
db_type = mysql

# ============================================================
# 其他配置
# ============================================================

[ai_model]
# 大模型API配置
api_url = http://182.207.164.154:4004/aiQA.do
api_key = your-api-key-here
timeout = 60
max_retries = 3

[logging]
# 日志配置
log_level = INFO
log_file = logs/sql_analyzer.log
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[processing]
# 处理配置
batch_size = 10
max_workers = 4
large_table_threshold = 100000

[app]
# 应用配置
debug = false
max_sql_length = 10000

# ============================================================
# 配置使用说明：
# ============================================================

# 1. 多数据库配置格式：
#    [数据库别名:实例编号]
#    例如：[db_production:1], [db_production:2]
#
# 2. 程序会自动扫描所有实例：
#    - 使用 collect_metadata_from_all_instances() 收集所有实例的元数据
#    - 使用 collect_metadata_until_found() 依次尝试实例直到找到表
#    - 使用 get_execution_plan() 在找到表的实例上获取执行计划
#
# 3. 兼容性：
#    - 传统单实例格式 [db_production] 仍然支持
#    - 可以混合使用单实例和多实例配置
#
# 4. 在 am_solline_info 表中：
#    - SYSTEMID 字段用作数据库别名
#    - 如果 SYSTEMID = 'db_production'，会扫描所有 db_production 实例
#    - 如果 SYSTEMID = 'ECUP'，会扫描所有 ECUP 实例
#
# 5. 执行计划获取：
#    - 程序会在找到表的实例上获取执行计划
#    - 避免在错误的实例上执行EXPLAIN