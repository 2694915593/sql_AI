# AI-SQL质量分析系统配置文件模板
# 请复制此文件为config.ini并填写实际配置

[database]
# 源数据库配置（存储待分析SQL的数据库）
source_host = localhost
source_port = 3306
source_database = testdb
source_username = root
source_password = 123456
source_db_type = mysql

[ECUP:1]
# ECUP系统数据库配置 - 实例1
host = localhost
port = 3306
database = ecupdb_instance1
username = root
password = 123456
db_type = mysql

[ECUP:2]
# ECUP系统数据库配置 - 实例2
host = localhost
port = 3307
database = ecupdb_instance2
username = root
password = 123456
db_type = mysql

[ai_model]
# 大模型API配置
api_url = http://182.207.164.154:4004/aiQA.do
api_key = your-api-key-here
timeout = 60
max_retries = 3

[logging]
# 日志配置
log_level = INFO
log_file = logs/sql_analyzer.log
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[processing]
# 处理配置
batch_size = 10
max_workers = 4
large_table_threshold = 100000

[app]
# 应用配置
debug = false
max_sql_length = 10000

[optimization]
# 优化功能配置
enable_data_fetching = true
max_sample_size = 100
use_cache = true
enable_dynamic_sql_parsing = true
dynamic_sql_timeout = 30
max_dynamic_sql_retries = 3

[remote_server]
# 远程服务器配置（用于读取shell脚本文件）
enabled = true
host = 182.118.38.115
username = wasadmin
password = sjyh1234
base_path = ~/jump-management/TAG
port = 22
timeout = 30