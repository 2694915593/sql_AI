# AI-SQL质量分析系统配置文件 - 多数据库测试配置

[database]
# 源数据库配置（存储待分析SQL的数据库）
source_host = localhost
source_port = 3306
source_database = sql_analysis_db
source_username = root
source_password = 123456
source_db_type = mysql

# 多数据库配置示例
# 传统单实例配置格式（保持兼容）
[db_production]
host = localhost
port = 3306
database = production_legacy_db
username = root
password = 123456
db_type = mysql

# 新的多实例配置格式
[db_production:1]
host = localhost
port = 3306
database = production_a_db
username = root
password = 123456
db_type = mysql

[db_production:2]
host = localhost
port = 3307
database = production_b_db
username = root
password = 123456
db_type = mysql

[db_production:3]
host = localhost
port = 3308
database = production_c_db
username = root
password = 123456
db_type = mysql

[db_test]
host = localhost
port = 3306
database = test_db
username = root
password = 123456
db_type = mysql

[ECUP]
# ECUP系统数据库配置
host = localhost
port = 3306
database = ecupdb
username = root
password = 123456
db_type = mysql

[ai_model]
# 大模型API配置
api_url = http://182.207.164.154:4004/aiQA.do
api_key = your-api-key-here
timeout = 60
max_retries = 3

[logging]
# 日志配置
log_level = INFO
log_file = logs/sql_analyzer.log
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[processing]
# 处理配置
batch_size = 10
max_workers = 4
large_table_threshold = 100000

[app]
# 应用配置
debug = false
max_sql_length = 10000