# AI-SQL质量分析系统多数据库配置示例
# 支持配置多个同名数据库，系统会自动扫描所有实例

[database]
# 源数据库配置（存储待分析SQL的数据库）
source_host = localhost
source_port = 3306
source_database = sql_analysis_db
source_username = root
source_password = 123456
source_db_type = mysql

# 多数据库配置示例 - 支持同名数据库
# 场景1: 配置两个名为db_production的数据库，但连接不同的服务器/数据库
[db_production]
host = server1.company.com
port = 3306
database = production_db_a
username = user_a
password = pass123
db_type = mysql

[db_production]
host = server2.company.com  
port = 3306
database = production_db_b
username = user_b
password = pass456
db_type = mysql

# 场景2: 使用冒号格式的多实例配置（推荐格式）
# 更清晰，可以明确指定实例编号
[db_production:1]
host = server1.company.com
port = 3306
database = production_db_a
username = user_a
password = pass123
db_type = mysql

[db_production:2]
host = server2.company.com
port = 3306
database = production_db_b
username = user_b
password = pass456
db_type = mysql

[db_production:3]
host = server3.company.com
port = 3307
database = production_db_c
username = user_c
password = pass789
db_type = mysql

# 其他数据库配置
[db_test]
host = localhost
port = 3306
database = test_db
username = root
password = 123456
db_type = mysql

[ECUP]
host = localhost
port = 3306
database = ecupdb
username = root
password = 123456
db_type = mysql

[ai_model]
# 大模型API配置
api_url = http://182.207.164.154:4004/aiQA.do
api_key = your-api-key-here
timeout = 60
max_retries = 3

[logging]
log_level = INFO
log_file = logs/sql_analyzer.log
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[processing]
batch_size = 10
max_workers = 4
large_table_threshold = 100000

[app]
debug = false
max_sql_length = 10000

# ==================== 使用说明 ====================
# 
# 1. 同名数据库配置的两种方式：
#    a) 直接重复节名（如上面的[db_production]重复两次）
#       - 系统会自动为重复节添加内部后缀（db_production__1, db_production__2）
#       - 扫描时会同时处理所有同名配置
#       
#    b) 使用冒号格式的实例编号（如[db_production:1], [db_production:2]）
#       - 这是推荐格式，更清晰
#       - 系统会按编号顺序处理实例
#       
# 2. 系统如何工作：
#    - 当遇到SQL语句需要从db_production收集表元数据时
#    - 系统会扫描所有db_production的实例（包括重复节和冒号格式的实例）
#    - 收集所有实例的表元数据，提供给AI模型分析
#    
# 3. 如果只需要扫描第一个可用的实例，可以使用：
#    metadata_collector.collect_metadata_until_found(db_alias, table_names)
#    
# 4. 查看所有数据库实例：
#    config_manager.get_all_target_db_configs('db_production')
#