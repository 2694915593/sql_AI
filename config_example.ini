# AI-SQL质量分析系统配置文件（增强版）
# 支持SQL规范检查功能

[database]
source_host = localhost
source_port = 3306
source_database = sql_analysis_db
source_username = your_username
source_password = your_password
source_db_type = mysql

# 目标数据库配置（可配置多个）
[db_production]
host = 192.168.1.100
port = 3306
database = production_db
username = your_username
password = your_password
db_type = mysql

[db_testing]
host = 192.168.1.101
port = 3306
database = testing_db
username = your_username
password = your_password
db_type = mysql

# AI模型配置
[ai_model]
api_url = http://your-ai-service.com/api/analyze-sql
api_key = your-api-key-here
timeout = 30
max_retries = 3

# 处理配置
[processing]
batch_size = 10
max_workers = 4
large_table_threshold = 100000

# 日志配置
[logging]
log_level = INFO
log_file = logs/sql_analyzer.log
max_file_size = 10MB
backup_count = 5

# SQL规范配置（增强版新增）
[specifications]
# 规范检查权重（0.0-1.0）
compliance_weight = 0.3
# 是否启用严格模式
strict_mode = false
# 是否记录所有规范检查
log_all_checks = true
