# 测试配置文件
[database]
source_host = localhost
source_port = 3306
source_database = testdb
source_username = root
source_password = 123456
source_db_type = mysql

[db_production]
host = localhost
port = 3306
database = testdb
username = root
password = 123456
db_type = mysql

[ai_model]
api_url = http://localhost:9999/mock-api
api_key = test_key
timeout = 5
max_retries = 1

[logging]
log_level = INFO
log_file = logs/sql_analyzer.log
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[processing]
batch_size = 10
max_workers = 4
large_table_threshold = 100000

[app]
debug = true
max_sql_length = 10000