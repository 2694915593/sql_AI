# AI-SQL质量分析系统配置文件模板
# 请复制此文件为config.ini并填写实际配置

[database]
# 源数据库配置（存储待分析SQL的数据库）
source_host = localhost
source_port = 3306
source_database = testdb
source_username = root
source_password = 123456
source_db_type = mysql

[db_production]
# 生产数据库配置（SQL语句要查询的目标数据库）
host = localhost
port = 3306
database = testdb
username = root
password = 123456
db_type = mysql

# 可以配置多个目标数据库，使用不同别名
[db_test]
host = localhost
port = 3306
database = testdb
username = root
password = 123456
db_type = mysql

[ECUP]
# ECUP系统数据库配置
host = localhost
port = 3306
database = ecupdb
username = root
password = 123456
db_type = mysql

[ai_model]
# 大模型API配置
api_url = http://182.207.164.154:4004/aiQA.do
api_key = your-api-key-here
timeout = 60
max_retries = 3

[logging]
# 日志配置
log_level = INFO
log_file = logs/sql_analyzer.log
log_format = %%(asctime)s - %%(name)s - %%(levelname)s - %%(message)s

[processing]
# 处理配置
batch_size = 10
max_workers = 4
large_table_threshold = 100000

[app]
# 应用配置
debug = false
max_sql_length = 10000
